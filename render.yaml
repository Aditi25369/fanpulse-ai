services:
  - type: web
    name: fanpulse-ai-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: ALLOWED_ORIGINS
        value: https://fanpulse-ai.vercel.app
    healthCheckPath: /health
